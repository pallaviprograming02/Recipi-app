<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartReceipt - Receipt Scanner & Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/>
                    </svg>
                    <h1 class="text-3xl font-bold">SmartReceipt</h1>
                </div>
                <div class="text-right">
                    <p class="text-sm opacity-90">Total Receipts</p>
                    <p class="text-2xl font-bold" id="totalCount">0</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container mx-auto px-4 py-8">
        <!-- Navigation Tabs -->
        <div class="bg-white rounded-lg shadow-md mb-6">
            <div class="flex border-b">
                <button onclick="showTab('add')" id="tab-add" class="tab-btn flex-1 px-6 py-4 font-semibold text-purple-600 border-b-2 border-purple-600">
                    ➕ Add Receipt
                </button>
                <button onclick="showTab('list')" id="tab-list" class="tab-btn flex-1 px-6 py-4 font-semibold text-gray-500 hover:text-purple-600">
                    📋 All Receipts
                </button>
                <button onclick="showTab('analytics')" id="tab-analytics" class="tab-btn flex-1 px-6 py-4 font-semibold text-gray-500 hover:text-purple-600">
                    📊 Analytics
                </button>
            </div>
        </div>

        <!-- Add Receipt Tab -->
        <div id="content-add" class="tab-content">
            <div class="grid md:grid-cols-2 gap-6">
                <!-- Upload Receipt Image -->
                <div class="bg-white rounded-lg shadow-md p-6 slide-in">
                    <h2 class="text-xl font-bold mb-4 text-gray-800">📸 Scan Receipt</h2>
                    <div class="border-2 border-dashed border-purple-300 rounded-lg p-8 text-center hover:border-purple-500 transition cursor-pointer" onclick="document.getElementById('receiptImage').click()">
                        <input type="file" id="receiptImage" accept="image/*" class="hidden" onchange="previewImage(event)">
                        <div id="imagePreview" class="mb-4">
                            <svg class="w-16 h-16 mx-auto text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <p class="text-gray-600">Click to upload receipt image</p>
                        <p class="text-sm text-gray-400 mt-2">PNG, JPG up to 10MB</p>
                    </div>
                    <button onclick="quickScan()" class="mt-4 w-full bg-purple-600 text-white py-3 rounded-lg hover:bg-purple-700 font-semibold">
                        🔍 Quick Scan (Auto-fill)
                    </button>
                </div>

                <!-- Manual Entry Form -->
                <div class="bg-white rounded-lg shadow-md p-6 slide-in">
                    <h2 class="text-xl font-bold mb-4 text-gray-800">✍️ Enter Details</h2>
                    <form onsubmit="addReceipt(event)" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Store Name</label>
                            <input type="text" id="storeName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent" placeholder="e.g., Amazon, Walmart">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Amount (₹)</label>
                            <input type="number" id="amount" step="0.01" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent" placeholder="0.00">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
                            <select id="category" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                                <option value="Food">🍔 Food & Dining</option>
                                <option value="Shopping">🛍️ Shopping</option>
                                <option value="Transport">🚗 Transport</option>
                                <option value="Bills">💡 Bills & Utilities</option>
                                <option value="Healthcare">🏥 Healthcare</option>
                                <option value="Entertainment">🎬 Entertainment</option>
                                <option value="Other">📦 Other</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Date</label>
                            <input type="date" id="date" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Notes (Optional)</label>
                            <textarea id="notes" rows="2" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent" placeholder="Additional details..."></textarea>
                        </div>
                        <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 font-semibold">
                            ✅ Save Receipt
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- All Receipts Tab -->
        <div id="content-list" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow-md p-6">
                <!-- Search & Filter -->
                <div class="mb-6 grid md:grid-cols-3 gap-4">
                    <input type="text" id="searchBox" onkeyup="filterReceipts()" placeholder="🔍 Search receipts..." class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                    <select id="filterCategory" onchange="filterReceipts()" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                        <option value="">All Categories</option>
                        <option value="Food">🍔 Food & Dining</option>
                        <option value="Shopping">🛍️ Shopping</option>
                        <option value="Transport">🚗 Transport</option>
                        <option value="Bills">💡 Bills & Utilities</option>
                        <option value="Healthcare">🏥 Healthcare</option>
                        <option value="Entertainment">🎬 Entertainment</option>
                        <option value="Other">📦 Other</option>
                    </select>
                    <select id="sortBy" onchange="filterReceipts()" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                        <option value="date-desc">Date (Newest)</option>
                        <option value="date-asc">Date (Oldest)</option>
                        <option value="amount-desc">Amount (High to Low)</option>
                        <option value="amount-asc">Amount (Low to High)</option>
                    </select>
                </div>

                <!-- Receipts List -->
                <div id="receiptsList" class="space-y-4">
                    <p class="text-center text-gray-400 py-8">No receipts yet. Add your first receipt! 📝</p>
                </div>
            </div>
        </div>

        <!-- Analytics Tab -->
        <div id="content-analytics" class="tab-content hidden">
            <div class="grid md:grid-cols-3 gap-6 mb-6">
                <!-- Stats Cards -->
                <div class="bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-lg shadow-lg p-6">
                    <p class="text-sm opacity-90">Total Spent</p>
                    <p class="text-3xl font-bold mt-2" id="totalSpent">₹0</p>
                </div>
                <div class="bg-gradient-to-br from-green-500 to-green-600 text-white rounded-lg shadow-lg p-6">
                    <p class="text-sm opacity-90">This Month</p>
                    <p class="text-3xl font-bold mt-2" id="monthSpent">₹0</p>
                </div>
                <div class="bg-gradient-to-br from-purple-500 to-purple-600 text-white rounded-lg shadow-lg p-6">
                    <p class="text-sm opacity-90">Average Receipt</p>
                    <p class="text-3xl font-bold mt-2" id="avgSpent">₹0</p>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <!-- Category Chart -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h3 class="text-lg font-bold mb-4 text-gray-800">Spending by Category</h3>
                    <canvas id="categoryChart"></canvas>
                </div>

                <!-- Monthly Trend Chart -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h3 class="text-lg font-bold mb-4 text-gray-800">Monthly Trend</h3>
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <!-- Export Options -->
            <div class="bg-white rounded-lg shadow-md p-6 mt-6">
                <h3 class="text-lg font-bold mb-4 text-gray-800">📥 Export Data</h3>
                <div class="grid md:grid-cols-3 gap-4">
                    <button onclick="exportPDF()" class="bg-red-600 text-white py-3 rounded-lg hover:bg-red-700 font-semibold">
                        📄 Export as PDF
                    </button>
                    <button onclick="exportCSV()" class="bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 font-semibold">
                        📊 Export as CSV
                    </button>
                    <button onclick="clearAllData()" class="bg-gray-600 text-white py-3 rounded-lg hover:bg-gray-700 font-semibold">
                        🗑️ Clear All Data
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 right-8 bg-green-600 text-white px-6 py-4 rounded-lg shadow-lg hidden">
        <p id="toastMessage"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
